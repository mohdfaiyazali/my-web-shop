{% load static %}

<!DOCTYPE html>

<html>
<head>
    <title>E-Commerce App</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Optional CSS -->
<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body class="bg-light">

<!-- 🔝 Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

<a class="navbar-brand" href="{% url 'home' %}">🛒 MyShop</a>
<a href="{% url 'order_history' %}" class="btn btn-info btn-sm">
    Orders
</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
  <span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
  <div class="ms-auto d-flex align-items-center gap-2">

    <!-- 🛍 Cart -->
    <a href="{% url 'view_cart' %}" class="btn btn-warning btn-sm">
       🛒 Cart
    </a>

    {% if user.is_authenticated %}
        <span class="text-white">Hi, {{ user.username }}</span>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-danger btn-sm">Logout</button>
        </form>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Login</a>
    {% endif %}

  </div>
</div>

  </div>
</nav>

<!-- 📦 Main Content -->

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- 🔻 Footer -->

<footer class="text-center mt-5 mb-3 text-muted">
    <small>© 2026 MyShop. All rights reserved.</small>
</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
